<!DOCTYPE html>
<html>
<head>
    <title>Add Plan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Add New Land Use Plan</h2>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <div class="mb-3">
            <label>Plan Title</label>

            <input
                type="text"
                name="title"
                class="form-control"
                required
            >
        </div>

        <div class="mb-3">
            <label>Description</label>

            <textarea
                name="description"
                class="form-control"
                rows="4"
                required
            ></textarea>
        </div>

        <div class="mb-3">
            <label>Image</label>

            <input
                type="file"
                name="image"
                class="form-control"
            >
        </div>

        <div class="mb-3">
            <label>Latitude</label>

            <input
                type="number"
                step="any"
                name="latitude"
                class="form-control"
            >
        </div>

        <div class="mb-3">
            <label>Longitude</label>

            <input
                type="number"
                step="any"
                name="longitude"
                class="form-control"
            >
        </div>

        <div class="mb-3">
            <label>Status</label>

            <select
                name="status"
                class="form-control"
            >
                <option value="Draft">Draft</option>
                <option value="Open">Open</option>
                <option value="Closed">Closed</option>
            </select>
        </div>

        <button
            type="submit"
            class="btn btn-success"
        >
            Save Plan
        </button>

    </form>

</div>

</body>
</html>
