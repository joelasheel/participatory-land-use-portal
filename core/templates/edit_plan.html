<!DOCTYPE html>
<html>

<head>

    <title>Edit Plan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Edit Land Use Plan</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">

<label>Title</label>

<input
type="text"
name="title"
class="form-control"
value="{{ plan.title }}"
required>

</div>

<div class="mb-3">

<label>Description</label>

<textarea
name="description"
class="form-control"
rows="4"
required>{{ plan.description }}</textarea>

</div>

<div class="mb-3">

<label>Status</label>

<select
name="status"
class="form-control">

<option value="Draft" {% if plan.status == "Draft" %}selected{% endif %}>Draft</option>

<option value="Open" {% if plan.status == "Open" %}selected{% endif %}>Open</option>

<option value="Closed" {% if plan.status == "Closed" %}selected{% endif %}>Closed</option>

</select>

</div>

<div class="mb-3">

<label>Latitude</label>

<input
type="number"
step="any"
name="latitude"
value="{{ plan.latitude }}"
class="form-control">

</div>

<div class="mb-3">

<label>Longitude</label>

<input
type="number"
step="any"
name="longitude"
value="{{ plan.longitude }}"
class="form-control">

</div>

<div class="mb-3">

<label>Image</label>

<input
type="file"
name="image"
class="form-control">

</div>

<button
class="btn btn-primary">

Update Plan

</button>

</form>

</div>

</body>

</html>
