<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Participatory Land Use Planning Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#0d6efd,#20c997);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial,Helvetica,sans-serif;
        }

        .register-card{
            width:430px;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.25);
            overflow:hidden;
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:25px;
        }

        .card-body{
            padding:35px;
        }

        .btn-register{
            width:100%;
            border-radius:10px;
            font-weight:bold;
        }

        input{
            border-radius:10px !important;
        }

        a{
            text-decoration:none;
        }

    </style>

</head>
<body>

<div class="card register-card">

    <div class="card-header">

        <h3>Create Account</h3>

        <p class="mb-0">
            Participatory Land Use Planning Portal
        </p>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">Username</label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Choose username"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">Password</label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Create password"
                    required>

            </div>

            <button class="btn btn-success btn-register">

                Create Account

            </button>

        </form>

        <hr>

        <p class="text-center mb-0">

            Already have an account?

            <a href="/login/">

                Login here

            </a>

        </p>

    </div>

</div>

</body>
</html>
