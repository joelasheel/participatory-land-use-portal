<!DOCTYPE html>
<html>
<head>
    <a
      href="/report/"
      class="btn btn-primary mb-4"
    >
         Download PDF Report
    </a>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Dashboard</title>

    <link
     href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
     rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">
        System Dashboard
    </h1>

    <div class="row">

        <div class="col-md-3">
            <div class="card p-3 shadow-sm">
                <h3>{{ total_plans }}</h3>
                <p>Total Plans</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow-sm">
                <h3>{{ total_comments }}</h3>
                <p>Total Comments</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow-sm">
                <h3>{{ total_votes }}</h3>
                <p>Total Votes</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow-sm">
                <h3>{{ total_users }}</h3>
                <p>Total Users</p>
            </div>
        </div>

        <div class="card mt-5 p-4 shadow-sm">

            <h3 class="mb-4">
                 Participation Analytics
            </h3>

            <canvas id="myChart"></canvas>

        </div>

    </div>

</div>

<script>

const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',

    data: {
        labels: [
            'Plans',
            'Comments',
            'Votes',
            'Users'
        ],

        datasets: [{
            label: 'System Statistics',

            data: [
                {{ total_plans }},
                {{ total_comments }},
                {{ total_votes }},
                {{ total_users }}
            ],

            borderWidth: 1
        }]
    },

    options: {
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

</script>

</body>
</html>
